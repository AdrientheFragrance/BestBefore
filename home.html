<!DOCTYPE html>

<html>

    <head>
        <title> BestBefore </title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <script defer src="script.js"></script>
    </head>
    
    <body>

        <nav class="nav">
            <img src="BestBeforeLogo.png" style="width:12%;padding:8px;margin:10px;margin-left:40px;">
            <a href="help.html"> Help </a>
            <a href="about.html"> About </a>
            <a href="home.html"> Home </a>
        </nav>

        <div class="container">

            <div class="sidebar-container">
                <div class="sidebar">
                    <h2> Pantry Items </h2> 
                    <form id="addIngredient">
                        <label for="ingredient"> Ingredient </label>
                        <input type="text" id="ingredient" required> 
                        <br>
                        <label for="expiration"> Expiration </label>
                        <input type="text" id="expiration" placeholder="MM/DD/YY">
                        <br>
                        <button type="button" id="add-ingredient">Add Ingredient</button>
                        <br>
                    </form>
                </div>

                <div class="sidebar" id="pantrySidebar">
                    <div id="pantryItemsContainer">
                    </div>
                </div>
            </div>

            <div class="main-content">
                <h2>Recipes</h2>
                <label>Select ingredients to find recipes!</label>
                <br><br>
                <div class="recipeitem" id="recipeResults">
                    <!-- Recipes will be injected here -->
                </div>
            </div>

            <div id="imageOverlay" class="hidden">
                <div id="overlayBg"></div>
                <img id="overlayImg" src="" alt="">
                <button id="closeOverlay">X</button> <!-- Close Button -->
            </div>              

        </div>

        <br><br><br><br><br><br><br><br>

        <footer>
            <p> Copyright @ 2025. All rights reserved. </p>
        </footer>

    </body>

</html>
